<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morten Stene</title>
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #111;
      font-size: 15px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* LANGUAGE SWITCHER */
    .lang-bar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0.7rem 0;
      text-align: center;
    }
    .lang-bar button {
      background: none;
      border: 1.5px solid transparent;
      color: #777;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 16px;
      cursor: pointer;
      border-radius: 20px;
      margin: 0 3px;
      transition: all 0.18s ease;
    }
    .lang-bar button:hover { color: #111; border-color: #bbb; }
    .lang-bar button.active { color: #111; border-color: #111; background: #f5f5f5; font-weight: 700; }

    /* TAB SWITCHER */
    .tab-bar {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      display: flex;
      justify-content: center;
      gap: 0;
    }
    .tab-btn {
      padding: 1rem 2.5rem;
      border: none;
      background: none;
      font-size: 0.88rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.18s;
      letter-spacing: 0.02em;
    }
    .tab-btn:hover { color: #111; }
    .tab-btn.active { color: #111; border-bottom-color: #111; }

    /* COMPANY BANNER */
    .company-banner {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 0.6rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 2rem 0 1.8rem;
    }
    .header-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    header img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
    header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.15rem; }
    header .subtitle { font-size: 0.95rem; color: #555; margin-bottom: 0.5rem; }
    .header-links { display: flex; gap: 0.7rem; flex-wrap: wrap; align-items: center; font-size: 0.82rem; }
    .header-links span { color: #bbb; }
    a { color: #111; text-decoration: underline; text-underline-offset: 2px; }
    a:hover { opacity: 0.6; }

    /* CV TAB */
    #tab-cv { display: block; }
    #tab-soknad { display: none; }

    main {
      max-width: 740px;
      margin: 0 auto;
      padding: 2rem 2rem;
    }

    section { margin-bottom: 2rem; opacity: 0; transform: translateY(16px); animation: slideUp 0.4s ease forwards; }
    section:nth-child(1) { animation-delay: 0.05s; }
    section:nth-child(2) { animation-delay: 0.12s; }
    section:nth-child(3) { animation-delay: 0.19s; }
    section:nth-child(4) { animation-delay: 0.26s; }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .section-header {
      background: #111;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      margin-bottom: 1.1rem;
      display: inline-block;
    }

    .entry { display: grid; grid-template-columns: 115px 1fr; gap: 0 1.2rem; margin-bottom: 1rem; }
    .entry:last-child { margin-bottom: 0; }
    .entry-date { font-size: 0.76rem; color: #777; padding-top: 2px; }
    .entry-title { font-weight: 700; font-size: 0.86rem; }
    .entry-company { font-size: 0.8rem; font-style: italic; color: #444; margin-top: 2px; }
    .entry-desc { font-size: 0.8rem; color: #333; margin-top: 3px; line-height: 1.55; }
    .skills-text { font-size: 0.83rem; color: #333; line-height: 2.1; }

    /* SOKNAD TAB */
    .soknad-wrap { max-width: 740px; margin: 0 auto; padding: 2rem; }
    .soknad-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; display: block; }
    .soknad-textarea {
      width: 100%;
      min-height: 480px;
      padding: 1.2rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: 'Georgia', serif;
      line-height: 1.75;
      color: #222;
      background: #fff;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .soknad-textarea:focus { outline: none; border-color: #111; }
    .soknad-hint { font-size: 0.75rem; color: #aaa; margin-top: 0.5rem; }

    footer {
      border-top: 1px solid #e0e0e0;
      padding-top: 1.5rem;
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.78rem;
      color: #888;
    }
    .footer-links { display: flex; gap: 1rem; }

    .diploma-link {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.75rem;
      color: #555;
      text-decoration: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 8px;
      transition: all 0.15s;
    }
    .diploma-link:hover { background: #f5f5f5; color: #111; border-color: #999; }

    @media (max-width: 540px) {
      .entry { grid-template-columns: 1fr; }
      .entry-date { margin-bottom: 2px; }
      .tab-btn { padding: 0.8rem 1.2rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<div class="lang-bar">
  <button class="active" onclick="setLang('nn')">Nynorsk</button>
  <button onclick="setLang('nb')">Bokm&aring;l</button>
  <button onclick="setLang('en')">English</button>
</div>

<div class="company-banner" id="companyBanner">Tilpassa for: &mdash;</div>

<header>
  <div class="header-inner">
    <img src="https://media.licdn.com/dms/image/v2/D4D03AQGabDLXI_Mctg/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1727349725331?e=1778716800&v=beta&t=mSFBEwCvkXjyJxisSnuos1flFkKvybCHHU2TtOwGNCs" alt="Portrettbilete av Morten Stene" />
    <div>
      <h1>Morten Stene</h1>
      <div class="subtitle" id="header-subtitle">Kommunikasjon og digitale medium</div>
      <div class="header-links">
        <a href="mailto:mstene95@gmail.com">mstene95@gmail.com</a>
        <span>&middot;</span>
        <span>+47 924 95 858</span>
        <span>&middot;</span>
        <a href="https://www.linkedin.com/in/morten-stene/" target="_blank" rel="noopener">LinkedIn</a>
        <span>&middot;</span>
        <a href="https://github.com/Mortey12" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="setTab('cv')" id="tbtn-cv">&#128196; CV</button>
  <button class="tab-btn" onclick="setTab('soknad')" id="tbtn-soknad">&#9997;&#65039; S&oslash;knad</button>
</div>

<!-- CV TAB -->
<div id="tab-cv">
  <main id="cv-main"></main>
</div>

<!-- SOKNAD TAB -->
<div id="tab-soknad">
  <div class="soknad-wrap">
    <label class="soknad-label" for="soknadText">S&oslash;knadstekst</label>
    <textarea class="soknad-textarea" id="soknadText" placeholder="Skriv eller lim inn s&oslash;knadsteksten din her...

Spar han automatisk i nettlesaren &#128521;"></textarea>
    <div class="soknad-hint">Teksten vert lagra lokalt i nettlesaren din, og er der neste gong du opnar sida.</div>
  </div>
</div>

<script>
let currentLang = 'nn';

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj['nn'] || obj['nb'] || '';
}

// Parse URL params
const params = new URLSearchParams(window.location.search);
const bedrift = params.get('bedrift') || '';
const blokker = (params.get('blokker') || '').split(',').filter(Boolean);

// Set company banner
if (bedrift) {
  const display = bedrift.charAt(0).toUpperCase() + bedrift.slice(1);
  document.getElementById('companyBanner').textContent = 'Tilpassa for: ' + display;
  document.title = 'Morten Stene \u2014 ' + display;
}

// Tab switching
function setTab(tab) {
  document.getElementById('tab-cv').style.display = tab === 'cv' ? 'block' : 'none';
  document.getElementById('tab-soknad').style.display = tab === 'soknad' ? 'block' : 'none';
  document.getElementById('tbtn-cv').classList.toggle('active', tab === 'cv');
  document.getElementById('tbtn-soknad').classList.toggle('active', tab === 'soknad');
}

// Language switching
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-bar button').forEach((btn, i) => {
    const isActive = ['nn','nb','en'][i] === lang;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  document.getElementById('header-subtitle').textContent = t(MORTEN.title);
  document.documentElement.lang = lang === 'en' ? 'en' : 'no';
  renderCV();
}

// Render CV
function renderCV() {
  const main = document.getElementById('cv-main');
  const selectedBlocks = blokker.length > 0
    ? MORTEN.blocks.filter(b => blokker.includes(b.id))
    : MORTEN.blocks;

  const cats = [
    { id: 'work', label: { nn: 'Arbeidserfaring', nb: 'Arbeidserfaring', en: 'Work Experience' } },
    { id: 'voluntary', label: { nn: 'Frivillig og organisasjonserfaring', nb: 'Frivillig og organisasjonserfaring', en: 'Voluntary and Organisational Experience' } },
    { id: 'education', label: { nn: 'Utdanning', nb: 'Utdanning', en: 'Education' } },
    { id: 'skills', label: { nn: 'Ferdigheiter', nb: 'Ferdigheter', en: 'Skills' } }
  ];

  let html = '';
  cats.forEach((cat, idx) => {
    const blocks = selectedBlocks.filter(b => b.category === cat.id);
    if (blocks.length === 0) return;

    html += `<section style="animation-delay:${0.05 + idx * 0.07}s">`;
    html += `<div class="section-header">${t(cat.label)}</div>`;

    if (cat.id === 'skills') {
      blocks.forEach(b => {
        const skills = Array.isArray(b.skills) ? b.skills : (b.skills ? (b.skills[currentLang] || b.skills['nn'] || []) : []);
        html += `<div class="skills-text">${skills.join(' &middot; ')}</div>`;
      });
    } else {
      blocks.forEach(b => {
        const companyHtml = b.companyUrl
          ? `<a href="${b.companyUrl}" target="_blank" rel="noopener" style="color:#444;font-style:italic;">${t(b.company)}</a>`
          : t(b.company);
        const diplomaHtml = b.diplomaUrl
          ? `<a href="${b.diplomaUrl}" target="_blank" rel="noopener" class="diploma-link">&#128196; Sjå diplom / bekreftelse</a>`
          : '';
        html += `<div class="entry">
          <div class="entry-date">${t(b.date)}</div>
          <div>
            <div class="entry-title">${t(b.title)}</div>
            <div class="entry-company">${companyHtml}</div>
            <div class="entry-desc">${t(b.desc)}</div>
            ${diplomaHtml}
          </div>
        </div>`;
      });
    }
    html += '</section>';
  });

  // Footer
  html += `<footer>
    <span>Morten Stene &middot; Bergen &middot; 2025</span>
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/morten-stene/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/Mortey12" target="_blank" rel="noopener">GitHub</a>
      <a href="mailto:mstene95@gmail.com">E-post</a>
    </div>
  </footer>`;

  main.innerHTML = html;
}

// Save/load soknad text per company
const storageKey = 'soknad_' + (bedrift || 'default');
const textarea = document.getElementById('soknadText');
const saved = localStorage.getItem(storageKey);
if (saved) textarea.value = saved;
textarea.addEventListener('input', () => {
  localStorage.setItem(storageKey, textarea.value);
});

// Init
renderCV();
</script>
</body>
</html>
